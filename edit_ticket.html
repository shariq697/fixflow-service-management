{% extends "layout.html" %}

{% block content %}
    <h1 class="page-title">Edit Ticket</h1>

    <div class="card">
        <form method="POST" action="">
            <div class="form-group">
                <label>Title</label>
                <input type="text" name="title" value="{{ ticket.title }}" required>
            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea name="description" rows="5" required>{{ ticket.description }}</textarea>
            </div>

            <div class="form-group">
                <label>Status</label>
                <select name="status" required>
                    <option value="Open" {% if ticket.status == "Open" %}selected{% endif %}>Open</option>
                    <option value="In Progress" {% if ticket.status == "In Progress" %}selected{% endif %}>In Progress</option>
                    <option value="Closed" {% if ticket.status == "Closed" %}selected{% endif %}>Closed</option>
                </select>
            </div>

            <div class="form-group">
                <label>Priority</label>
                <select name="priority" required>
                    <option value="Low" {% if ticket.priority == "Low" %}selected{% endif %}>Low</option>
                    <option value="Medium" {% if ticket.priority == "Medium" %}selected{% endif %}>Medium</option>
                    <option value="High" {% if ticket.priority == "High" %}selected{% endif %}>High</option>
                </select>
            </div>

            <div class="form-group">
                <label>Department</label>
                <select name="department_id" required>
                    {% for dept in departments %}
                        <option value="{{ dept.department_id }}"
                            {% if ticket.department_id == dept.department_id %}selected{% endif %}>
                            {{ dept.name }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label>Assign Technician</label>
                <select name="technician_id">
                    <option value="">Unassigned</option>
                    {% for tech in technicians %}
                        <option value="{{ tech.technician_id }}"
                            {% if ticket.technician_id == tech.technician_id %}selected{% endif %}>
                            {{ tech.full_name }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="actions">
                <input class="btn" type="submit" value="Update Ticket">
                <a class="btn btn-secondary" href="/tickets">Back</a>
            </div>
        </form>
    </div>
{% endblock %}
